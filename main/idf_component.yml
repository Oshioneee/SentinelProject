## idf_component.yml  -  NODE_1 managed component manifest
#
# This file tells the IDF component manager which managed components
# this project uses.  Without it, "espressif__cjson" in REQUIRES is
# resolved but the manager doesn't know to fetch/include its headers.
#
# IDF v6 cJSON note:
#   The managed component "espressif/cjson" replaces the old built-in
#   "json" component.  Both the REQUIRES name (espressif__cjson) and
#   the dependency name here (espressif/cjson) must be used — they
#   refer to the same package.
#
# Run  idf.py update-dependencies  after adding new entries here.

dependencies:
  idf:
    version: ">=5.0.0"

  espressif/cjson:
    version: ">=1.7.14"